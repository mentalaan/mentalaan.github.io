<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ｍｅｎｔａｌａｎ // 6969</title>
    <style>
        /* Importing a retro pixel font */
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #090a0f 0%, #1c093a 50%, #2b003a 100%);
            height: 100vh;
            overflow: hidden;
            font-family: 'VT323', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        /* === BULLETPROOF CSS MARQUEE === */
        .vapor-marquee-container {
            width: 100%;
            background-color: #ff71ce;
            color: #2b1055;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: clamp(0.9rem, 3vw, 1.2rem); /* Fluid font size */
            padding: 10px 0;
            position: absolute;
            top: 0;
            border-bottom: 3px solid #01cdfe;
            z-index: 10;
            overflow: hidden;
            white-space: nowrap;
        }

        .vapor-marquee-text {
            display: inline-block;
            animation: scrollText 15s linear infinite; 
        }

        @keyframes scrollText {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        /* === THE GLOWING SUN & SCANLINES === */
        .sun {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            /* Using min() ensures it doesn't get too wide on small screens */
            width: min(35vh, 80vw);
            height: min(35vh, 80vw);
            background: linear-gradient(180deg, #ffea00 0%, #ff0055 100%);
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(255, 0, 85, 0.8), 0 0 120px rgba(255, 234, 0, 0.4);
            z-index: 1;
        }

        .sun::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0%,
                transparent 4%,
                #1c093a 4%,
                #1c093a 5%
            );
        }

        /* === 3D SCROLLING NEON GRID === */
        .grid-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50vh;
            perspective: 600px;
            z-index: 2;
        }

        .grid {
            position: absolute;
            width: 200vw;
            height: 200vh;
            bottom: -50vh;
            left: -50vw;
            background-image: 
                linear-gradient(to right, rgba(0, 255, 255, 0.8) 2px, transparent 2px),
                linear-gradient(to top, rgba(255, 0, 255, 0.8) 2px, transparent 2px);
            background-size: 60px 60px;
            transform: rotateX(75deg);
            animation: scrollGrid 1.5s linear infinite;
            box-shadow: inset 0 100px 100px rgba(28, 9, 58, 1);
        }

        @keyframes scrollGrid {
            0% { transform: rotateX(75deg) translateY(0); }
            100% { transform: rotateX(75deg) translateY(60px); }
        }

        /* === FLOATING GLASS CARD === */
        .glass-card {
            position: relative;
            z-index: 3;
            width: 90%; /* Responsive width */
            max-width: 600px; /* Caps the width on desktop */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: clamp(20px, 5vw, 40px); /* Fluid padding */
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            animation: float 4s ease-in-out infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* === TYPOGRAPHY & MEDIA === */
        h1 {
            color: #fff;
            /* clamp(MIN, PREFERRED, MAX) */
            font-size: clamp(2.5rem, 8vw, 4.5rem); 
            letter-spacing: clamp(3px, 2vw, 10px);
            text-transform: uppercase;
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #0ff, 0 0 40px #0ff, 0 0 80px #0ff;
            margin-bottom: 5px;
            line-height: 1.1;
        }

        p {
            color: #05ffa1;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            letter-spacing: clamp(2px, 1vw, 5px);
            text-shadow: 0 0 10px #05ffa1;
            margin-bottom: 20px;
        }

        .aesthetic-gif {
            width: 100%; /* Makes it responsive */
            max-width: 300px; /* Prevents it from getting too big */
            height: auto;
            border-radius: 10px;
            margin-bottom: 30px;
            border: 2px solid rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            opacity: 0.85;
            transition: opacity 0.3s;
        }

        .aesthetic-gif:hover {
            opacity: 1;
        }

        /* === HIT COUNTER STYLES === */
        .vapor-counter-box {
            font-family: 'Courier New', Courier, monospace;
            background-color: #ff00ff;
            color: #00ffff;
            border: 3px solid #00ffff;
            padding: clamp(10px, 3vw, 15px) clamp(15px, 4vw, 30px);
            display: flex;
            flex-direction: column; /* Stacks text and number on mobile */
            align-items: center;
            justify-content: center;
            gap: 5px;
            width: 100%;
            max-width: 400px;
            box-shadow: 6px 6px 0px #000080;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Media query for desktop to put counter items side-by-side */
        @media (min-width: 480px) {
            .vapor-counter-box {
                flex-direction: row;
                gap: 15px;
            }
        }

        .vapor-label {
            font-size: clamp(1rem, 3vw, 1.3rem);
            text-shadow: 2px 2px #000080;
        }

        .vapor-number {
            font-size: clamp(1.5rem, 5vw, 2rem);
            font-weight: bold;
            text-shadow: 3px 3px #000080;
            color: #ffffff;
        }

        /* === THE BONK BUTTON === */
        .vapor-btn {
            background-color: rgba(0, 0, 0, 0.5);
            border: 2px solid #05ffa1;
            padding: 10px 20px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(5, 255, 161, 0.5), inset 0 0 10px rgba(5, 255, 161, 0.5);
            transition: all 0.2s ease-in-out;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vapor-btn:hover {
            background-color: rgba(5, 255, 161, 0.2);
            box-shadow: 0 0 25px #05ffa1, inset 0 0 20px #05ffa1;
            transform: scale(1.05);
        }

        .vapor-btn:active {
            transform: scale(0.90);
        }

        .btn-gif {
            height: clamp(40px, 10vw, 60px); /* Scales the button GIF slightly */
            width: auto;
            border-radius: 5px;
            transition: filter 0.2s;
        }
    </style>
</head>
<body>

    <div class="vapor-marquee-container">
        <div class="vapor-marquee-text">
            🤘🏻 இப்ப இல்லனா எப்பவும் இல்ல 🤘🏻 காலம் பேசாது, ஆனால் காத்திருந்து பதில் சொல்லும் 🤘🏻
        </div>
    </div>
    
    <div class="sun"></div>
    
    <div class="grid-container">
        <div class="grid"></div>
    </div>

    <div class="glass-card">
        <h1>Ｍｅｎｔａｌａｎ</h1>
        <p>// メンタラン //</p>
        
        <img class="aesthetic-gif" src="mentalan.gif" alt="Aesthetic GIF">

        <div class="vapor-counter-box">
            <span class="vapor-label">TIMES rANDOM mENTALANS bONKED</span>
            <span id="visitor-count" class="vapor-number">∞</span>
        </div>

        <button id="hit-btn" class="vapor-btn">
            <img src="bonk.gif" alt="BONK" class="btn-gif">
        </button>
        
    </div>

    <script>
        const backendUrl = "https://mentalan-backend.onrender.com/counter";
        const LoadUrl = "https://mentalan-backend.onrender.com/bonks";
        
        const counterElement = document.getElementById("visitor-count");
        const hitButton = document.getElementById("hit-btn");

        async function triggerHit() {
            try {
                hitButton.innerHTML = '<img src="bonk.gif" alt="BONK" class="btn-gif" style="filter: grayscale(100%); opacity: 0.5;">';
                
                const response = await fetch(backendUrl);
                const data = await response.json();
                
                counterElement.innerText = data.count;
                hitButton.innerHTML = '<img src="bonk.gif" alt="BONK" class="btn-gif">';
                
            } catch (error) {
                console.error("API Error:", error);
                counterElement.innerText = "ERR";
                hitButton.innerHTML = '<span style="color: #ffeb3b; font-family: \'VT323\', monospace; font-size: 1.5rem;">ＥＲＲＯＲ</span>';
                counterElement.style.color = "#ffeb3b";
            }
        }

        async function reloadHit() {
            try {
                hitButton.innerHTML = '<img src="bonk.gif" alt="BONK" class="btn-gif" style="filter: grayscale(100%); opacity: 0.5;">';
                
                const response = await fetch(LoadUrl);
                const data = await response.json();
                
                counterElement.innerText = data.count;
                hitButton.innerHTML = '<img src="bonk.gif" alt="BONK" class="btn-gif">';
                
            } catch (error) {
                console.error("API Error:", error);
                counterElement.innerText = "ERR";
                counterElement.style.color = "#ffeb3b";
            }
        }

        reloadHit();
        hitButton.addEventListener("click", triggerHit);
    </script>

</body>
</html>
