<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A E S T H E T I C</title>
    <style>
        /* Importing a retro pixel font */
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #090a0f 0%, #1c093a 50%, #2b003a 100%);
            height: 100vh;
            overflow: hidden;
            font-family: 'VT323', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        /* The glowing vaporwave sun */
        .sun {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30vh;
            height: 30vh;
            background: linear-gradient(180deg, #ffea00 0%, #ff0055 100%);
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(255, 0, 85, 0.8), 0 0 120px rgba(255, 234, 0, 0.4);
            z-index: 1;
        }

        /* The sun's horizontal scanlines */
        .sun::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0%,
                transparent 4%,
                #1c093a 4%,
                #1c093a 5%
            );
        }

        /* 3D scrolling neon grid */
        .grid-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50vh;
            perspective: 600px;
            z-index: 2;
        }

        .grid {
            position: absolute;
            width: 200vw;
            height: 200vh;
            bottom: -50vh;
            left: -50vw;
            background-image: 
                linear-gradient(to right, rgba(0, 255, 255, 0.8) 2px, transparent 2px),
                linear-gradient(to top, rgba(255, 0, 255, 0.8) 2px, transparent 2px);
            background-size: 60px 60px;
            transform: rotateX(75deg);
            animation: scrollGrid 1.5s linear infinite;
            box-shadow: inset 0 100px 100px rgba(28, 9, 58, 1);
        }

        @keyframes scrollGrid {
            0% {
                transform: rotateX(75deg) translateY(0);
            }
            100% {
                transform: rotateX(75deg) translateY(60px);
            }
        }

        /* Floating glassmorphism card for the GIF */
        .glass-card {
            position: relative;
            z-index: 3;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            animation: float 4s ease-in-out infinite;
        }

        /* Smooth floating animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* Glitch text effect */
        h1 {
            color: #fff;
            font-size: 4rem;
            letter-spacing: 15px;
            text-transform: uppercase;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #0ff,
                0 0 40px #0ff,
                0 0 80px #0ff;
            margin-bottom: 20px;
        }

        p {
            color: #ff00aa;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #ff00aa;
        }

        /* Optional: An actual aesthetic GIF inside the glass card */
        .aesthetic-gif {
            width: 300px;
            height: auto;
            border-radius: 10px;
            margin-top: 20px;
            border: 2px solid rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .aesthetic-gif:hover {
            opacity: 1;
        }

    </style>
</head>
<body>

    <div class="sun"></div>
    <div class="grid-container">
        <div class="grid"></div>
    </div>

    <div class="glass-card">
        <h1>V A P O R W A V E</h1>
        <p>エ ス テ テ ィ ッ ク</p>
        <img class="aesthetic-gif" src="mentalan.gif" alt="Aesthetic GIF">
    </div>

</body>
</html>
