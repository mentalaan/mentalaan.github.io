<head>
    <meta charset="UTF-8">

    <title>Ｍｅｎｔａｌａｎ // ６９６９</title>

    <style>
        /* === BASE AESTHETIC === */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            touch-action: none;
            background-color: #1a0b2e;
        }

        body {
            /* Deeper synthwave sky gradient */
            background: linear-gradient(180deg, #090214 0%, #1a0b2e 40%, #52154e 60%);
            color: #01cdfe;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            transition: filter 0.1s ease;
        }

        /* === STARFIELD === */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60vh;
            z-index: 0;
            pointer-events: none;
        }

        .stars::after {
            content: "";
            position: absolute;
            top: 10px; left: 10px;
            width: 2px; height: 2px;
            background: white;
            /* Generating CSS stars using box-shadow */
            box-shadow: 
                10vw 5vh #fff, 20vw 15vh #fff, 30vw 35vh #fff, 40vw 2vh #fff, 
                50vw 45vh #fff, 60vw 12vh #fff, 70vw 25vh #fff, 80vw 4vh #fff, 
                90vw 30vh #fff, 15vw 50vh #fff, 35vw 20vh #fff, 55vw 5vh #fff,
                75vw 40vh #fff, 85vw 15vh #fff, 95vw 25vh #fff,
                25vw 25vh #ff71ce, 45vw 35vh #01cdfe, 65vw 15vh #fffb96, 85vw 5vh #ff71ce;
            animation: twinkle 3s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* === RANDOMIZED GLOBAL EFFECTS ON CLOSE === */
        body.effect-glitch {
            animation: pageGlitch 0.3s cubic-bezier(.25, .46, .45, .94) both;
            filter: hue-rotate(90deg) contrast(150%) invert(10%);
        }

        body.effect-blur-shake {
            animation: shake 0.3s linear both;
            filter: blur(6px) contrast(200%) saturate(300%);
        }

        @keyframes pageGlitch {
            0% { transform: translate(0) }
            20% { transform: translate(-10px, 10px) }
            40% { transform: translate(-10px, -10px) }
            60% { transform: translate(10px, 10px) }
            80% { transform: translate(10px, -10px) }
            100% { transform: translate(0) }
        }

        @keyframes shake {
            0% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-25px, 15px) rotate(-5deg); }
            40% { transform: translate(25px, -15px) rotate(5deg); }
            60% { transform: translate(-25px, -25px) rotate(-5deg); }
            80% { transform: translate(25px, 25px) rotate(5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* === CRT SCANLINES (CLEANED - NO NOISE) === */
        .crt::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
            opacity: 0.8;
            animation: scanlines 10s linear infinite;
        }

        @keyframes scanlines {
            0% { background-position: 0 0; }
            100% { background-position: 0 100vh; }
        }

        /* === TYPOGRAPHY === */
        .text-container {
            position: relative;
            z-index: 10;
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
            margin-top: -10vh; /* Lifted slightly to balance scene */
        }

        h1 {
            font-size: 5rem;
            color: #fffb96;
            text-shadow: 4px 4px 0px #ff71ce, 0 0 20px #ff71ce;
            letter-spacing: 15px;
            margin-bottom: 0;
            text-transform: uppercase;
            animation: neonPulse 3s ease-in-out infinite alternate;
        }

        @keyframes neonPulse {
            0% { text-shadow: 4px 4px 0px #ff71ce, 0 0 15px #ff71ce; }
            100% { text-shadow: 4px 4px 0px #ff71ce, 0 0 35px #ff71ce, 0 0 10px #fff; }
        }

        h2 {
            color: #05ffa1;
            text-shadow: 2px 2px 0px #2b1055, 0 0 10px #05ffa1;
            letter-spacing: 10px;
            margin-top: 10px;
            margin-bottom: 40px;
        }

         .vapor-marquee-container {
            width: 100%;
            background-color: #ff71ce;
            color: #2b1055;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 10px 0;
            position: absolute;
            top: 0;
            left: 0;
            border-bottom: 3px solid #01cdfe;
            z-index: 10;
            overflow: hidden;
            white-space: nowrap;
            box-shadow: 0 0 15px #ff71ce;
        }

        .vapor-marquee-text {
            display: inline-block;
            animation: scrollText 15s linear infinite; 
        }

        @keyframes scrollText {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        /* === NEW MARQUEE ICON STYLING === */
    .marquee-icon {
        height: 1.6em; /* Slightly taller than the text for prominence */
        vertical-align: middle;
        margin-left: 0.5ch; /* Compact spacing */
        display: inline-block;
    }
        /* === WINDOWS 95 UI === */
        .win95-window {
            background: #c0c0c0;
            border-top: 3px solid #ffffff;
            border-left: 3px solid #ffffff;
            border-right: 3px solid #808080;
            border-bottom: 3px solid #808080;
            padding: 2px;
            width: 350px;
            position: absolute;
            z-index: 50;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            transform-origin: center;
        }

        #visitor-window {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .win95-window.closing {
            transform: scale(0.8) !important;
            opacity: 0;
            pointer-events: none;
        }

        .win95-titlebar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            font-family: Arial, sans-serif;
            font-size: 14px;
            font-weight: bold;
            padding: 4px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 1px;
            cursor: grab;
            user-select: none;
        }

        .win95-titlebar:active {
            cursor: grabbing;
        }

        .win95-close {
            background: #c0c0c0;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #000000;
            border-bottom: 2px solid #000000;
            width: 16px;
            height: 16px;
            font-weight: bold;
            color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }

        .win95-close:hover {
            background: #ff4d4d;
            color: white;
        }

        .win95-close:active {
            border-top: 2px solid #000000;
            border-left: 2px solid #000000;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
        }

        .win95-content {
            padding: 20px;
            color: #000;
            font-family: 'Courier New', Courier, monospace;
        }

        .vapor-number {
            font-size: 3rem;
            font-weight: bold;
            color: #ff00ff;
            text-shadow: 2px 2px #00ffff;
            display: block;
            margin-top: 10px;
        }

        /* === POPUP STYLES === */
        .popup-window {
            width: 250px;
            animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .popup-img {
            width: 100%;
            height: auto;
            border: 2px solid #808080;
            box-sizing: border-box;
            display: block;
            pointer-events: none;
        }

        /* === THE HORIZON (SUN & DENSER GRID) === */
        .sun {
            width: 300px;
            height: 300px;
            background: linear-gradient(180deg, #ffeb3b 0%, #ff71ce 100%);
            border-radius: 50%;
            position: absolute;
            bottom: 20vh;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            box-shadow: 0 0 80px #ff71ce, 0 0 150px rgba(255, 113, 206, 0.4);
            mask-image: repeating-linear-gradient(to bottom, black 0%, black 8%, transparent 8%, transparent 10%);
            -webkit-mask-image: repeating-linear-gradient(to bottom, black 0%, black 8%, transparent 8%, transparent 10%);
            pointer-events: none;
        }

        .grid-container {
            perspective: 600px;
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40vh; /* Connects right at the horizon line */
            z-index: 2;
            pointer-events: none;
            /* Fade out the back of the grid so it blends into the horizon */
            mask-image: linear-gradient(to bottom, transparent 0%, black 60%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 60%);
        }

        .grid {
            width: 200%;
            height: 200%;
            position: absolute;
            bottom: -50%;
            left: -50%;
            background-image: 
                linear-gradient(to right, #01cdfe 2px, transparent 2px),
                linear-gradient(to top, #ff71ce 2px, transparent 2px);
            background-size: 40px 40px; /* Denser grid size */
            transform: rotateX(75deg);
            animation: moveGrid 3s linear infinite;
            box-shadow: 0 0 20px #01cdfe inset;
        }

        /* === ANIMATIONS === */
        @keyframes moveGrid {
            0% { transform: rotateX(75deg) translateY(0); }
            100% { transform: rotateX(75deg) translateY(40px); } /* Loop matches the new grid size perfectly */
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* === MOBILE RESPONSIVENESS === */
        @media screen and (max-width: 768px) {
            .text-container { margin-top: -5vh; }
            h1 { font-size: 2.2rem; letter-spacing: 5px; text-shadow: 2px 2px 0px #ff71ce, 0 0 10px #ff71ce; }
            h2 { font-size: 1.2rem; letter-spacing: 4px; margin-bottom: 20px; }
            .sun { width: 220px; height: 220px; bottom: 30vh; }
            .win95-window { width: 85%; max-width: 350px; }
            .popup-window { width: 200px; }
            .vapor-number { font-size: 2rem; }
            .vapor-marquee-container { font-size: 1rem; }
        }
    </style>
</head>

    <div class="stars"></div>

    <div class="sun"></div>

    <div class="text-container">
        <h1>ＴＯＢＩ</h1>
        <h2>// デジタル //</h2>
    </div>

    <div class="win95-window" id="visitor-window">
        <div class="win95-titlebar" id="visitor-titlebar">
            <span>visitor_log.exe</span>
            <div class="win95-close" id="close-btn" aria-label="Close window">X</div>
        </div>
        <div class="win95-content">
            <span style="font-weight: bold;">VISITOR ID:</span>
            <span id="visitor-count" class="vapor-number">L0AD1NG...</span>
        </div>
    </div>

    <script>
        // ⚠️ CHANGE THIS URL to your actual Render backend URL
        const backendUrl = "https://mentalan-backend.onrender.com/visits";

        // --- Z-INDEX MANAGEMENT ---
        let currentZIndex = 50;
        function bringToFront(element) {
            currentZIndex++;
            element.style.zIndex = currentZIndex;
        }

        // --- DRAG LOGIC ---
        function makeDraggable(element, handle) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;

            handle.onmousedown = dragMouseDown;
            handle.ontouchstart = dragTouchStart;

            function dragMouseDown(e) {
                e.preventDefault();
                bringToFront(element);
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }

            function dragTouchStart(e) {
                bringToFront(element);
                pos3 = e.touches[0].clientX;
                pos4 = e.touches[0].clientY;
                document.ontouchend = closeDragElement;
                document.ontouchmove = elementDragTouch;
            }

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                
                if (element.style.transform.includes('translate')) {
                    element.style.transform = 'none';
                }

                element.style.top = (element.offsetTop - pos2) + "px";
                element.style.left = (element.offsetLeft - pos1) + "px";
            }

            function elementDragTouch(e) {
                pos1 = pos3 - e.touches[0].clientX;
                pos2 = pos4 - e.touches[0].clientY;
                pos3 = e.touches[0].clientX;
                pos4 = e.touches[0].clientY;
                
                if (element.style.transform.includes('translate')) {
                    element.style.transform = 'none';
                }

                element.style.top = (element.offsetTop - pos2) + "px";
                element.style.left = (element.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
                document.ontouchend = null;
                document.ontouchmove = null;
            }
            
            element.onmousedown = () => bringToFront(element);
            element.ontouchstart = () => bringToFront(element);
        }

        makeDraggable(document.getElementById("visitor-window"), document.getElementById("visitor-titlebar"));

        // --- FETCH LOGIC ---
        async function fetchHitCount() {
            const counterElement = document.getElementById("visitor-count");
            try {
                const response = await fetch(backendUrl);
                if (!response.ok) throw new Error("Network response was not ok");
                const data = await response.json();
                setTimeout(() => {
                    counterElement.innerText = data.count;
                }, 800);
            } catch (error) {
                console.error("Error fetching the counter:", error);
                setTimeout(() => {
                    counterElement.innerText = "ERR_404";
                    counterElement.style.color = "#ff0000"; 
                    counterElement.style.textShadow = "2px 2px #000";
                }, 800);
            }
        }

        // --- RANDOM PAGE EFFECTS ---
        const effects = [
            'effect-glitch', 
            'effect-blur-shake'
        ];

        function triggerRandomEffect() {
            effects.forEach(eff => document.body.classList.remove(eff));

            const randomEffect = effects[Math.floor(Math.random() * effects.length)];
            document.body.classList.add(randomEffect);
            
            setTimeout(() => {
                document.body.classList.remove(randomEffect);
            }, 300);
        }

        // --- POPUP LOGIC ---
        const gifUrls = [
            "gifs/mentalan.gif", 
            "gifs/mentalan_2.gif", 
            "gifs/vj.gif", 
            "gifs/whistle.gif", 
            "gifs/budweiser.gif"  
        ];

        const popupTitles = [
            "ERROR_420.exe",
            "A_E_S_T_H_E_T_I_C.dll",
            "system_failure.bat",
            "D O L P H I N S.sys",
            "VIRUS_DETECTED.exe"
        ];

        let activeOrPendingPopups = 0; 

        function triggerPopupCascade() {
            const delays = [500, 1000, 1500, 2200, 2600]; 
            activeOrPendingPopups += delays.length; 

            delays.forEach(delay => {
                setTimeout(createRandomPopup, delay);
            });
        }

        function createRandomPopup() {
            const randomGif = gifUrls[Math.floor(Math.random() * gifUrls.length)];
            const randomTitle = popupTitles[Math.floor(Math.random() * popupTitles.length)];

            const popup = document.createElement("div");
            popup.className = "win95-window popup-window";
            
            const maxLeft = window.innerWidth - (window.innerWidth < 768 ? 200 : 250); 
            const maxTop = window.innerHeight - 250;
            popup.style.left = Math.max(0, Math.floor(Math.random() * maxLeft)) + "px";
            popup.style.top = Math.max(0, Math.floor(Math.random() * maxTop)) + "px";

            popup.innerHTML = `
                <div class="win95-titlebar">
                    <span>${randomTitle}</span>
                    <div class="win95-close popup-close">X</div>
                </div>
                <div style="padding: 10px; background: #c0c0c0;">
                    <img src="${randomGif}" class="popup-img" alt="Vaporwave GIF" onerror="this.src='https://via.placeholder.com/200x150?text=GIF+MISSING'">
                </div>
            `;

            document.body.appendChild(popup);

            makeDraggable(popup, popup.querySelector('.win95-titlebar'));
            bringToFront(popup);

            const closeBtn = popup.querySelector('.popup-close');
            closeBtn.addEventListener('click', () => {
                popup.classList.add("closing");
                
                triggerRandomEffect();

                setTimeout(() => {
                    popup.remove();
                    activeOrPendingPopups--; 
                    
                    if (activeOrPendingPopups === 0) {
                        triggerPopupCascade();
                    }
                }, 300);
            });
        }

        // --- UI INTERACTION LOGIC ---
        const mainCloseBtn = document.getElementById("close-btn");
        const windowElement = document.getElementById("visitor-window");

        mainCloseBtn.addEventListener("click", () => {
            windowElement.classList.add("closing");
            
            triggerRandomEffect();

            setTimeout(() => {
                windowElement.style.display = "none";
            }, 300);

            triggerPopupCascade();
        });

        fetchHitCount();
    </script>
